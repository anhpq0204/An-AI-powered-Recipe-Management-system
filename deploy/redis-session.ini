; ============================================================================
; Redis-backed PHP sessions for Food Recipe System
; Apply: install Redis + the PHP redis extension, drop this into
;        /etc/php/8.3/fpm/conf.d/30-frs-redis-session.ini, then
;        sudo systemctl restart php8.3-fpm
;
;   sudo apt install redis-server php8.3-redis
;
; WHY: PHP's default session handler writes files to local disk. That works
; on one server, but the moment you put the app behind a load balancer with
; 2+ app nodes, a user's session file lives on only one node — requests
; routed elsewhere appear logged out. Centralising sessions in Redis makes
; the PHP app STATELESS, which is the prerequisite for horizontal scaling.
;
; This is a configuration-only change: the application code already uses
; $_SESSION normally (see includes/session.php) and needs no edits.
; ============================================================================

session.save_handler = redis
session.save_path = "tcp://127.0.0.1:6379?database=0"

; Optional: namespace + auth if Redis is shared with other apps
; session.save_path = "tcp://127.0.0.1:6379?database=0&prefix=frs:&auth=YOUR_PASSWORD"
