# ============================================================================
# Nginx server block for Food Recipe System (frs.local)
# Apply with:
#   sudo cp /var/www/html/frs/deploy/nginx-frs.conf /etc/nginx/sites-available/frs
#   sudo nginx -t && sudo systemctl reload nginx
#
# Changes vs. the original vhost:
#   * Blocks direct HTTP access to .env, .git, backups/, composer/package files
#     (these are currently served as plain text — a credential leak).
#   * Adds gzip compression for text assets.
#   * Adds security response headers.
#   * Keeps the existing static-asset caching and PHP-FPM handling untouched.
# ============================================================================
server {
    listen 80;
    listen [::]:80;

    server_name frs.local;

    root /var/www/html/frs;
    index index.php index.html index.htm;

    access_log /var/log/nginx/frs_access.log;
    error_log  /var/log/nginx/frs_error.log;

    client_max_body_size 10M;

    # --- Gzip compression ---------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/javascript
               application/json application/xml image/svg+xml;

    # --- Security headers ----------------------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Block sensitive files (was leaking as plain text) -------------------
    location ~ /\.(?!well-known) {
        deny all;          # any dotfile: .env, .git, .htaccess, ...
    }
    location ~* \.(env|sql|lock|md|dist)$ {
        deny all;
    }
    location ^~ /backups/ {
        deny all;
    }
    location = /composer.json { deny all; }
    location = /composer.lock { deny all; }
    location = /package.json  { deny all; }

    # --- Application routing --------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    # --- Static asset caching -------------------------------------------------
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
