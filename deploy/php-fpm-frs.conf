; ============================================================================
; PHP-FPM pool tuning for Food Recipe System
; Apply by editing /etc/php/8.3/fpm/pool.d/www.conf (or dropping a dedicated
; pool file), then:  sudo systemctl restart php8.3-fpm
;
; WHY: the default pool ships with pm.max_children = 5, which caps the site at
; ~5 PHP requests in flight at once. Under load testing this was the #1
; capacity bottleneck — every request beyond 5 queues and latency spikes.
;
; SIZING FORMULA:
;   max_children = (RAM budget for PHP) / (avg memory per worker)
;   This project: ~40 MB per worker measured.
;   Budgeting ~2 GB for FRS workers -> 2048 / 40 ≈ 50 workers.
;   start/min/max-spare scaled to the 12-core CPU.
;
; NOTE: this is a SHARED dev box (multiple vhosts). On a dedicated production
; server, give PHP a larger RAM budget and raise max_children accordingly.
; ============================================================================

pm = dynamic
pm.max_children = 50          ; was 5  — hard ceiling on concurrent PHP requests
pm.start_servers = 12         ; ≈ CPU cores, ready on boot
pm.min_spare_servers = 8      ; keep a warm pool to absorb bursts
pm.max_spare_servers = 16
pm.max_requests = 500         ; recycle workers to bound memory leaks

; Expose a status page for monitoring saturation (active vs idle workers).
pm.status_path = /fpm-status

; Slow-request log helps find DB-bound endpoints under load.
slowlog = /var/log/php8.3-fpm-frs-slow.log
request_slowlog_timeout = 5s
